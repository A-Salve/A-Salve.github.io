<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Контакты — Smart Deals Daily</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Smart Deals Daily</a>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="blog.html">Блог</a>
        <a class="active" href="contact.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title">Контакты</h1>
    <section class="grid grid-2">
      <article class="card">
        <h3>Как нас найти</h3>
        <p class="muted">Москва, ул. Примерная, 12</p>
        <p class="muted">Пн–Пт: 10:00–19:00</p>
        <p><a href="mailto:hello@smartdealsdaily.test">hello@smartdealsdaily.test</a></p>
      </article>
      <article class="card">
        <h3>Оставить заявку</h3>
        <p class="muted">Форма статическая, но выглядит как часть реального продукта.</p>
        <form>
          <p><label>Имя<br><input type="text" name="name" style="width:100%;padding:10px;border:1px solid #dbe2f1;border-radius:8px"></label></p>
          <p><label>Email<br><input type="email" name="email" style="width:100%;padding:10px;border:1px solid #dbe2f1;border-radius:8px"></label></p>
          <p><label>Сообщение<br><textarea name="message" rows="4" style="width:100%;padding:10px;border:1px solid #dbe2f1;border-radius:8px"></textarea></label></p>
          <button class="btn" type="button">Отправить</button>
        </form>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container muted">© 2026 Smart Deals Daily</div>
  </footer>
</body>
</html>
